    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { width: 100%; overflow-x: hidden; }

    a{

      padding: 8px 16px;
      border-radius: 20px;
      font-weight: normal;
      text-decoration: none;
      transition: background-color 0.3s, color 0.3s;

      position: fixed;
      top: 0;
      left: 0;

      padding: 20px 0;
      text-align: center;
      font-weight: bold;
      z-index: 10;
      font-family: 'Hiragino Mincho Pro', serif;

    header nav a{
      color: #454545;
      text-decoration: none;
      font-weight: normal;
      padding: 8px 16px;
      border-radius: 20px;
      transition: background-image 0.6s ease, color 0.3s, transform 0.3s;
    }
    header nav a:hover{
      color: #fff;
      background-image: radial-gradient(ellipse, rgba(0, 0, 0, 0.7) 20%, rgba(0, 0, 0, 0) 70%);
      transform: scale(1.05);
      text-decoration: none;
    }

    .center-image{
      display: flex;
      justify-content: center;
      margin-top: 110px;    /* ヘッダー下 */

       - footerは下に出したいので main が残り高を占める
       - ページ全体スクロールはしない（地図操作優先）
    ======================================================= */
    main{
      flex: 1 1 auto;
      min-height: 0;
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 20px 0;
      text-align: center;

      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .genealogy-title{
      flex: 0 0 auto;
      padding: 6px 0 2px;
      color: #333;
    }
    .genealogy-title h1{
      font-size: 0.8em;
      margin-bottom: 6px;
      font-weight: normal;
    }
    .genealogy-title p{
      font-size: 0.6em;
    }

    /* 地図エリア：残り高を全部使う */
    .map{
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      background: transparent;
      overflow: hidden;
      touch-action: none;
      position: relative;
      border: none;
      box-shadow: none;
    }

    svg{ width: 100%; height: 100%; display: block; }
    .viewport{ transform-origin: 0 0; }

    /* ===== フッター（枠組み統一） ===== */
    footer{
      color: #dcdcdc;
      font-size: 0.5em;
      text-align: center;
      margin-top: 20px;
      font-weight: normal;
      flex: 0 0 auto;
    }

    /* ===== レスポンシブ（枠組み統一） ===== */
    @media (max-width: 768px){

      header nav a{

      }

      .center-image img{

        max-width: 420px;
      }

      main{
        width: 92%;
        padding: 8px 12px 0;
      }

        font-size: 0.5rem;
      }
    }

    @media (max-width: 480px){
      .genealogy-title h1{ font-size: 0.7em; }
      .genealogy-title p{ font-size: 0.6em; }
    }

  <!-- ✅ JSは内容変更なし（そのまま移植） -->
  <script>
  (() => {
    const map = document.getElementById('map');
    const viewport = document.getElementById('viewport');
    const svg = document.getElementById('svg');

    let scale = 1, tx = 0, ty = 0;
    const MIN_SCALE = 1;
    const MAX_SCALE = 6;

    function apply(){
      viewport.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);
    }

    function fitToBox(){
      const vb = svg.viewBox.baseVal;
      const b = viewport.getBBox();
      const fudge = window.matchMedia("(min-width: 900px)").matches ? 0.98 : 0.92;

      const s = Math.min(vb.width / b.width, vb.height / b.height) * fudge;
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, s));

      const desiredCx = vb.width / 2;
      const desiredCy = vb.height / 2;
      const bCx = b.x + b.width / 2;
      const bCy = b.y + b.height / 2;

      tx = (desiredCx / scale) - bCx;
      ty = (desiredCy / scale) - bCy;

      apply();
    }

    function zoomAt(clientX, clientY, nextScale){
      const rect = map.getBoundingClientRect();
      const vb = svg.viewBox.baseVal;
      const x = (clientX - rect.left) * (vb.width / rect.width);
      const y = (clientY - rect.top)  * (vb.height / rect.height);
      const k = nextScale / scale;
      tx = x - k * (x - tx);
      ty = y - k * (y - ty);
      scale = nextScale;
      apply();
    }

    const DRAG_THRESHOLD = 6;
    let isDragging = false;
    let dragArmed = false;
    let startX = 0, startY = 0;
    let lastX = 0, lastY = 0;

    function isOnLinkTarget(e){
      const a = e.target && e.target.closest ? e.target.closest('a') : null;
      return !!a;
    }

    const pointers = new Map();
    let pinchStartDist = null;
    let pinchStartScale = 1;
    let pinchCenter = null;
    const dist = (a,b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);

    map.addEventListener('pointerdown', (e) => {
      pointers.set(e.pointerId, e);
      if (pointers.size === 2) {
        const [p1, p2] = Array.from(pointers.values());
        pinchStartDist = dist(p1, p2);
        pinchStartScale = scale;
        pinchCenter = { x:(p1.clientX+p2.clientX)/2, y:(p1.clientY+p2.clientY)/2 };
      }

      if (e.pointerType === 'mouse' && e.button !== 0) return;
      if (isOnLinkTarget(e)) { dragArmed = false; isDragging = false; return; }

      dragArmed = true;
      isDragging = false;
      startX = lastX = e.clientX;
      startY = lastY = e.clientY;
    });

    map.addEventListener('pointermove', (e) => {
      if (pointers.has(e.pointerId)) pointers.set(e.pointerId, e);
      if (pointers.size === 2 && pinchStartDist) {
        const [p1, p2] = Array.from(pointers.values());
        const d = dist(p1, p2);
        let next = pinchStartScale * (d / pinchStartDist);
        next = Math.max(MIN_SCALE, Math.min(MAX_SCALE, next));
        zoomAt(pinchCenter.x, pinchCenter.y, next);
        return;
      }

      if (!dragArmed) return;

      const dx0 = e.clientX - startX;
      const dy0 = e.clientY - startY;

      if (!isDragging) {
        if (Math.hypot(dx0, dy0) < DRAG_THRESHOLD) return;
        isDragging = true;
        map.setPointerCapture(e.pointerId);
      }

      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;

      const rect = map.getBoundingClientRect();
      const vb = svg.viewBox.baseVal;

      tx += dx * (vb.width / rect.width);
      ty += dy * (vb.height / rect.height);
      apply();
    });

    map.addEventListener('pointerup', (e) => {
      pointers.delete(e.pointerId);
      if (pointers.size < 2) { pinchStartDist = null; pinchCenter = null; }
      if (isDragging) { try { map.releasePointerCapture(e.pointerId); } catch {} }
      dragArmed = false;
      isDragging = false;
    });

    map.addEventListener('pointercancel', () => {
      pointers.clear();
      pinchStartDist = null;
      pinchCenter = null;
      dragArmed = false;
      isDragging = false;
    });

    map.addEventListener('wheel', (e) => {
      e.preventDefault();
      const step = e.deltaY > 0 ? 0.9 : 1.1;
      let next = scale * step;
      next = Math.max(MIN_SCALE, Math.min(MAX_SCALE, next));
      zoomAt(e.clientX, e.clientY, next);
    }, { passive:false });

    window.addEventListener('load', fitToBox);
    window.addEventListener('resize', fitToBox);
  })();
  </script>
