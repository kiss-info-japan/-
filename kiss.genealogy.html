  <style>
    :root{
      --maxw: 1100px;
      --pad: 14px;
      --nav-h: 52px;
      --text: #111;
      --muted: #918f8f;
      --bg: #fff;
    }

    html, body{
      margin:0;
      padding:0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
    }

    /* ✅ナビ：中央寄せ、枠線なし */
    header{
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    header nav{
      height: var(--nav-h);
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 var(--pad);
      display: flex;
      justify-content: center;
      gap: 14px;
      align-items: center;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      white-space: nowrap;
    }
    header nav a{
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      padding: 8px 10px;
      border: none;
      border-radius: 999px;
      flex: 0 0 auto;
    }
  

    main{
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 18px var(--pad) 10px;
      text-align: center;
    }

    h1{
      margin: 10px 0 14px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ✅ここが本命：最初は“全体が収まる” */
    .map{
      width: 100%;
      height: min(40vh, 680px);
      margin: 0 auto;
      background: #fff;
      overflow: hidden; /* 図がはみ出しても隠す */
      touch-action: none; /* ピンチ/ドラッグをJSで扱う */
      position: relative;
    }

    /* SVGは“最初はフィット”させるため、コンテナに100%で入れる */
    svg{
      width: 100%;
      height: 100%;
      display: block;
    }

    /* SVGの中身をtransformするためのグループ */
    .viewport{
      transform-origin: 0 0;
    }

    footer{
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      padding: 22px 0 calc(22px + env(safe-area-inset-bottom));
      opacity: 0.9;
      font-weight: normal;
    }
    footer .small{ margin: 6px 0; }
  </style>
</head>

  <script>
(() => {
  const map = document.getElementById('map');
  const viewport = document.getElementById('viewport');
  const svg = document.getElementById('svg');

  let scale = 1, tx = 0, ty = 0;
  const MIN_SCALE = 1;
  const MAX_SCALE = 6;

  function apply(){
    viewport.setAttribute('transform', `translate(${tx} ${ty}) scale(${scale})`);
  }

  function zoomAt(clientX, clientY, nextScale){
    const rect = map.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;

    const x = (clientX - rect.left) * (vb.width / rect.width);
    const y = (clientY - rect.top)  * (vb.height / rect.height);

    const k = nextScale / scale;
    tx = x - k * (x - tx);
    ty = y - k * (y - ty);

    scale = nextScale;
    apply();
  }

  // ---- パン（ドラッグ）: 「少し動いたら」開始＆リンク上は開始しない ----
  const DRAG_THRESHOLD = 6; // px（この距離より動いたらドラッグ扱い）
  let isDragging = false;
  let dragArmed = false;   // 押した直後（まだドラッグじゃない）
  let startX = 0, startY = 0;
  let lastX = 0, lastY = 0;

  function isOnLinkTarget(e){
    // SVG内の<a>を探す（g/image/circleをタップしても<a>に包まれてる想定）
    const a = e.target && e.target.closest ? e.target.closest('a') : null;
    return !!a;
  }

  map.addEventListener('pointerdown', (e) => {
    // 2本指ピンチ処理があるので、ここでは「1本指の時だけ」パン準備
    if (e.pointerType === 'mouse' && e.button !== 0) return;

    // ✅リンク上ならパン準備しない（クリックを優先）
    if (isOnLinkTarget(e)) {
      dragArmed = false;
      isDragging = false;
      return;
    }

    dragArmed = true;
    isDragging = false;

    startX = lastX = e.clientX;
    startY = lastY = e.clientY;
  });

  map.addEventListener('pointermove', (e) => {
    if (!dragArmed) return;

    const dx0 = e.clientX - startX;
    const dy0 = e.clientY - startY;

    // まだドラッグ開始してないなら、しきい値超えたら開始
    if (!isDragging) {
      if (Math.hypot(dx0, dy0) < DRAG_THRESHOLD) return;
      isDragging = true;
      map.setPointerCapture(e.pointerId);
    }

    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;

    const rect = map.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;

    tx += dx * (vb.width / rect.width);
    ty += dy * (vb.height / rect.height);
    apply();
  });

  map.addEventListener('pointerup', (e) => {
    if (isDragging) {
      try { map.releasePointerCapture(e.pointerId); } catch {}
    }
    dragArmed = false;
    isDragging = false;
  });

  map.addEventListener('pointercancel', () => {
    dragArmed = false;
    isDragging = false;
  });

  // ---- ピンチズーム（2本指） ----
  const pointers = new Map();
  let pinchStartDist = null;
  let pinchStartScale = 1;
  let pinchCenter = null;

  const dist = (a,b) => Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);

  map.addEventListener('pointerdown', (e) => {
    pointers.set(e.pointerId, e);
    if (pointers.size === 2) {
      const [p1, p2] = Array.from(pointers.values());
      pinchStartDist = dist(p1, p2);
      pinchStartScale = scale;
      pinchCenter = { x:(p1.clientX+p2.clientX)/2, y:(p1.clientY+p2.clientY)/2 };
    }
  });

  map.addEventListener('pointermove', (e) => {
    if (!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, e);

    if (pointers.size === 2 && pinchStartDist) {
      const [p1, p2] = Array.from(pointers.values());
      const d = dist(p1, p2);
      let next = pinchStartScale * (d / pinchStartDist);
      next = Math.max(MIN_SCALE, Math.min(MAX_SCALE, next));
      zoomAt(pinchCenter.x, pinchCenter.y, next);
    }
  });

  map.addEventListener('pointerup', (e) => {
    pointers.delete(e.pointerId);
    if (pointers.size < 2) {
      pinchStartDist = null;
      pinchCenter = null;
    }
  });

  // ---- ホイールズーム（PC） ----
  map.addEventListener('wheel', (e) => {
    e.preventDefault();
    const step = e.deltaY > 0 ? 0.9 : 1.1;
    let next = scale * step;
    next = Math.max(MIN_SCALE, Math.min(MAX_SCALE, next));
    zoomAt(e.clientX, e.clientY, next);
  }, { passive:false });

  apply();
})();
</script>
