<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>愛の集い チラシ</title>

<style>
@page{ size:A4; margin:0; }
*{ box-sizing:border-box; }

html,body{
  margin:0;
  padding:0;
  background:#ffffff;
  font-family:"MS PGothic","MS Gothic",sans-serif;
}

.flyer{
  width:210mm;
  height:297mm;
  padding:12mm;
  background:linear-gradient(180deg,#ffccff 0%,#ccffff 100%);
  border:8px ridge #ff66cc;
  position:relative;
  overflow:hidden;
}

.flyer::before{
  content:"";
  position:absolute;
  width:145mm;
  height:145mm;
  top:-42mm;
  left:50%;
  transform:translateX(-50%);
  background:radial-gradient(circle,rgba(255,255,255,0.55) 0%,transparent 70%);
  pointer-events:none;
}

.topband{
  text-align:center;
  background:linear-gradient(90deg,#ff00cc,#6600ff);
  color:#fff;
  font-weight:bold;
  padding:5px 0;
  font-size:16px;
  border:3px double #000;
  letter-spacing:2px;
}

.headline{
  margin-top:10mm;
  text-align:center;
  font-size:44px;
  font-weight:bold;
  color:#ff0000;
  line-height:1.15;
  text-shadow:2px 2px 0 #ffffff, 4px 4px 0 #ff99ff;
}

.sub{
  margin-top:6mm;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  color:#0000ff;
}

.time{
  margin-top:6mm;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  color:#000;
  background:#ffffcc;
  border:3px solid #000;
  display:inline-block;
  padding:4px 12px;
}

.time-wrap{
  text-align:center;
}

.box{
  margin-top:10mm;
  width:100%;
  background:#fffaff;
  border:5px dashed #ff66cc;
  padding:9mm;
  font-size:16px;
  line-height:1.65;
}

.box h2{
  text-align:center;
  font-size:20px;
  margin:0 0 6mm 0;
  color:#ff00aa;
  font-weight:bold;
}

.small{
  margin-top:6mm;
  text-align:center;
  font-size:12px;
  border-top:2px dotted #000;
  padding-top:4mm;
}

.footer{
  margin-top:8mm;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="flyer">

  <div class="topband">
    ★☆ 愛の集い ☆★
  </div>

  <div class="headline">
    あなたは<br>
    ひとりじゃないよ！
  </div>

  <div class="sub">
    ★ あなたは愛されています ★
  </div>

  <div class="time-wrap">
    <div class="time">
      毎週土曜日　18:30〜
    </div>
  </div>

  <div class="box">
    <h2>〜 愛の集い 〜</h2>

    なんとなく、さみしい気持ちになる夜。<br>
    ちょっとだけ、心がつかれちゃった日。<br><br>

    そんなときに、ふらっと来られる場所です。<br><br>

    むずかしい話はありません。<br>
    がんばらなくて大丈夫です。<br><br>

    ただ、あたたかい空気の中で、<br>
    ぼーっとしてもいいし、<br>
    少しだけおしゃべりしてもいい。<br><br>

    ここでは、あなたはそのままでOKです。<br>
    いるだけで、ちゃんと大切な存在です。<br><br>

    愛って、遠くにあるものじゃなくて、<br>
    こうしてそっと、隣にあるものなんです。

   
  </div>

</div>

</body>
</html>
